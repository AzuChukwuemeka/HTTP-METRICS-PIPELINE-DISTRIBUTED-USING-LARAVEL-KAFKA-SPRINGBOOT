version: "3.9"

x-postgres-env: &postgres-env
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: metrics_platform
  DB_USERNAME: metrics_user
  DB_PASSWORD: metrics_password

x-kafka-env: &kafka-env
  KAFKA_BROKERS: kafka:9092
  KAFKA_EVENTS_TOPIC: http-events

services:

  postgres:
    image: postgres:16-alpine
    container_name: metrics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: metrics_platform
      POSTGRES_USER: metrics_user
      POSTGRES_PASSWORD: metrics_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metrics_user -d metrics_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: metrics-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: metrics-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: metrics-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists
      --topic http-events --partitions 3 --replication-factor 1"
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: metrics-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  laravel-app:
    build:
      context: ./laravel-app
    container_name: metrics-laravel-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      <<: [*postgres-env, *kafka-env]
      APP_ENV: local
      APP_DEBUG: "true"
      L5_SWAGGER_GENERATE_ALWAYS: "true"
      L5_SWAGGER_CONST_HOST: "http://localhost:8000/api"
    volumes:
      - laravel-storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/documentation"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  spring-boot-service:
    build:
      context: ./spring-boot-service
    container_name: metrics-spring-boot-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      laravel-app:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      <<: [*postgres-env, *kafka-env]
      WINDOW_SIZE_SECONDS: 60
      GRACE_PERIOD_SECONDS: 30

volumes:
  postgres-data:
  laravel-storage:
